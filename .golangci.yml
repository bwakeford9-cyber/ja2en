version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
  exclusions:
    rules:
      # G101 false-positives on env-var NAMES (APIKeyEnv field).
      - path: _test\.go
        linters:
          - gosec
        text: "G101"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
